
title: Ecology and Evolution of Infectious Disease

author:
  name: Dale Clement
  email: clemend@wfu.edu

description: >
  Quantitative epidemiologist and data scientist. Research on infectious disease dynamics,
  human behavior, and evolutionary biology.

repository: DaleTClement/DaleTClement.github.io
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://DaleTClement.github.io" # the base hostname & protocol for your site
github_username: DaleTClement

theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

sass:
  quiet_deps: true
  silence_deprecations: [import]

exclude:
  - _agent_context/
  - Dale_Clement-JHU-Modeler_Epidemiology-CV.txt
  - "~$*"
  - Gemfile
  - Gemfile.lock
  - README.md

minima:
  skin: classic

  # Navigation pages — list page paths in the order they should appear in the header.
  # To add a page to the nav bar, add its path here.
  nav_pages:
    - index.md
    - about.markdown
    - Research.md
    - Publications.md
    - blog.md
    - cv.md
    - BookList.md
    - contact.md

  # Set to `true` to show excerpts on the homepage.
  show_excerpts: false

  # Social Media Links
  #   Renders icons via Font Awesome Free webfonts CDN, based on ordered list of entries.
  #   Entry keys:
  #     * title    Tooltip rendered on hovering over icon.
  #     * icon     Font Awesome icon id. `github` corresponds to `fa-github`.
  #     * url      Full URL of social profile.
  social_links:
    - title: ORCID
      icon: orcid
      url: "https://orcid.org/0000-0001-7327-3323"
    - title: Google Scholar
      icon: google-scholar
      url: "https://scholar.google.com/citations?user=I300k4AAAAAJ&hl=en"
    - title: LinkedIn
      icon: linkedin
      url: "https://www.linkedin.com/in/dale-clement-a79aab361/"
    - title: GitHub
      icon: github
      url: "https://github.com/DaleTClement"
    

