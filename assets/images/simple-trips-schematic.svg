<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="500" height="320" fill="white" rx="8"/>

  <!-- Home location -->
  <circle cx="250" cy="80" r="45" fill="#f0f4f8" stroke="#2c3e50" stroke-width="2.5"/>
  <text x="250" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Home</text>
  <text x="250" y="95" text-anchor="middle" font-size="12" fill="#555">β₀</text>

  <!-- Away location 1 (low risk) -->
  <circle cx="100" cy="250" r="45" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="100" y="242" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Away 1</text>
  <text x="100" y="262" text-anchor="middle" font-size="12" fill="#555">β₁ (low)</text>

  <!-- Away location 2 (high risk) -->
  <circle cx="400" cy="250" r="45" fill="#ffebee" stroke="#c62828" stroke-width="2.5"/>
  <text x="400" y="242" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">Away 2</text>
  <text x="400" y="262" text-anchor="middle" font-size="12" fill="#555">β₂ (high)</text>

  <!-- Arrow: Home → Away 1 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Bidirectional arrows Home ↔ Away 1 -->
  <line x1="215" y1="115" x2="138" y2="212" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="128" y1="208" x2="207" y2="118" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Travel rate labels Home ↔ Away 1 -->
  <text x="145" y="155" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-35,145,155)">φ₁</text>
  <text x="195" y="185" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-35,195,185)">τ₁</text>

  <!-- Bidirectional arrows Home ↔ Away 2 -->
  <line x1="285" y1="115" x2="362" y2="212" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="372" y1="208" x2="293" y2="118" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Travel rate labels Home ↔ Away 2 -->
  <text x="355" y="155" text-anchor="middle" font-size="11" fill="#555" transform="rotate(35,355,155)">φ₂</text>
  <text x="305" y="185" text-anchor="middle" font-size="11" fill="#555" transform="rotate(35,305,185)">τ₂</text>

  <!-- Legend -->
  <text x="250" y="315" text-anchor="middle" font-size="11" fill="#888">φ = departure rate · τ = return rate · β = transmission rate</text>
</svg>
